<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Simulações Clínicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card shadow-lg" style="width: 100%; max-width: 400px;">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <span style="font-size: 3rem;">🏥</span>
            <h4 class="fw-bold mt-2 text-primary">Simulações Clínicas</h4>
            <p class="text-muted small">Faça login para acessar o painel</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuário</label>
                <input type="text" name="username" class="form-control form-control-lg"
                       placeholder="seu usuário" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Senha</label>
                <input type="password" name="password" class="form-control form-control-lg"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold">
                Entrar
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
